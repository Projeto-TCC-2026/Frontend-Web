<div class="flex min-h-screen">
  <!-- Mobile backdrop -->
  @if (mobileMenuOpen) {
    <div
      class="fixed inset-0 bg-[var(--color-neutro-900)]/50 z-40 md:hidden"
      (click)="closeMobileMenu()"
    ></div>
  }

  <!-- Sidebar -->
  <app-sidebar [class.sidebar-mobile-open]="mobileMenuOpen"></app-sidebar>

  <!-- Main content area -->
  <div class="flex-1 flex flex-col min-h-screen min-w-0">
    <app-header (menuToggle)="onMenuToggle()"></app-header>

    <div class="flex-1 flex flex-col px-8 max-md:px-4">
      <app-breadcrumb></app-breadcrumb>
      <main class="flex-1">
        <router-outlet></router-outlet>
      </main>
    </div>

    <app-footer></app-footer>
  </div>
</div>
