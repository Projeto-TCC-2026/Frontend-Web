<div class="flex flex-col gap-2 w-80 max-w-[90vw]">
    @for (toast of notifications.toasts$ | async; track toast.id) {
    <div
        class="flex items-start gap-3 rounded-lg px-4 py-3 shadow-lg text-white"
        [ngClass]="bgClass(toast.type)"
        role="status">
        <span class="flex-1 text-sm leading-snug">{{ toast.message }}</span>
        <button
            type="button"
            class="shrink-0 text-white/70 hover:text-white leading-none"
            aria-label="Fechar notificação"
            (click)="notifications.dismiss(toast.id)">&times;</button>
    </div>
    }
</div>
