<div class="flex flex-col items-end gap-3 max-w-[90vw]">
    @for (toast of notifications.toasts$ | async; track toast.id) {
    <div
        class="flex w-fit max-w-full items-center gap-3 rounded-full px-2 py-2 shadow-lg text-white"
        [ngClass]="bgClass(toast.type)"
        role="status">
        <span class="grid h-9 w-9 shrink-0 place-items-center rounded-full bg-white/20"
            aria-hidden="true">
            @switch (toast.type) {
                @case ('success') { <svg lucideCircleCheck [size]="18"></svg> }
                @case ('error') { <svg lucideCircleX [size]="18"></svg> }
                @case ('warning') { <svg lucideTriangleAlert [size]="18"></svg> }
                @case ('info') { <svg lucideInfo [size]="18"></svg> }
            }
        </span>
        <span class="flex-1 text-sm font-medium leading-relaxed whitespace-nowrap">{{ toast.message }}</span>
        <button
            type="button"
            class="grid h-9 w-9 shrink-0 cursor-pointer place-items-center rounded-full text-xl leading-none text-white/80 hover:bg-white/20 hover:text-white"
            aria-label="Fechar notificação"
            (click)="notifications.dismiss(toast.id)">&times;</button>
    </div>
    }
</div>
