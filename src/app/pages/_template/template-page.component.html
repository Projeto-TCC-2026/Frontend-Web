  PÁGINA MODELO — copie esta pasta para criar uma nova tela.

  1. Copie _template/ para pages/<nome-da-feature>/
  2. Renomeie os arquivos: template-page → <feature>
  3. Atualize o selector, classe e referências
  4. Adicione a rota em app.routes.ts com lazy loading:
     {
       path: '<feature>',
       data: { breadcrumb: 'Nome da Feature' },
       loadComponent: () => import('./pages/<feature>/<feature>.component')
         .then(m => m.<Feature>Component)
     }
